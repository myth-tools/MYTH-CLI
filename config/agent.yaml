  quick:
    description: "Fast surface-level scan (15-30 min)"
    mode: agent
    tools: ["lightpanda", "naabu -top-ports 1000", "httpx -probe -tech-detect", "subfinder", "nuclei -severity critical,high -t ~/nuclei-templates/cves/", "dalfox --pipe", "whatweb", "curl -I", "trufflehog --only-verified", "whois"]
