<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="myth-premium-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020408" />
      <stop offset="100%" stop-color="#050a14" />
    </linearGradient>
    <linearGradient id="myth-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffa3" />
      <stop offset="100%" stop-color="#00d1ff" />
    </linearGradient>
    <filter id="premium-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  {/* 1. Translucent Tactical Base (Rounded square with rounded corners transparency) */}
  <rect x="0" y="0" width="32" height="32" rx="9" fill="url(#myth-premium-bg)" />
  <rect x="0.5" y="0.5" width="31" height="31" rx="8.5" stroke="url(#myth-glow-grad)" stroke-width="1" stroke-opacity="0.15" />

  {/* 2. Primary Neon Hexagon (Heavy Glow) */}
  <path 
    d="M16 4L28 10.5V21.5L16 28L4 21.5V10.5L16 4Z" 
    stroke="url(#myth-glow-grad)" 
    stroke-width="0.8" 
    fill="url(#myth-glow-grad)" 
    fill-opacity="0.1" 
    filter="url(#premium-glow)"
  />

  {/* 3. Inner Core Pulsing - Intense Neon Glow */}
  <path 
    d="M16 10L22 13.5V18.5L16 22L10 18.5V13.5L16 10Z" 
    stroke="#00ffa3" 
    stroke-width="1.2" 
    fill="#00ffa3" 
    fill-opacity="0.3" 
    filter="url(#premium-glow)"
  />

  {/* 4. Primary Tactical "M" Glyph - White-Hot Intensity (Pixel Perfect from User Upload) */}
  <path 
    d="M7 23V9L15 19L17 19L25 9V23" 
    stroke="white" 
    stroke-width="4.5" 
    stroke-linejoin="miter" 
    stroke-linecap="square" 
    filter="url(#premium-glow)"
  />
</svg>