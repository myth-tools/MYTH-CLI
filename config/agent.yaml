# ═══════════════════════════════════════════════════════════
#  MYTH — Internal Agent Defaults (COMPILED INTO BINARY)
#  ─────────────────────────────────────────────────────────
#  DO NOT distribute this file to users.
#  These values are embedded at compile time via include_str!
#  User-facing overrides go in config/user.yaml
# ═══════════════════════════════════════════════════════════

# ─── Agent Defaults ───
agent:
  name: "MYTH"
  version: "0.1.0"
  author: "shesher"
  repository_url: "https://github.com/myth-tools/MYTH-CLI"
  pages_url: "https://myth.work.gd"
  max_iterations: 5000
  timeout_seconds: 1200
  # Default operative handle — overridden by user.yaml
  user_name: "Chief"
  log_level: "error"
  # Empty = auto-resolve to the installing user's ~/Downloads at runtime
  all_report_path: ""
  max_history_turns: 40

# ─── Creator Details ───
creator:
  name: "Shesher Hasan"
  role: "Chief Architect"
  contact: "shesher0llms@gmail.com"
  organization: "myth-tools"
  clearance_level: "OPERATIVE-LEVEL-4 (SENIOR ARCHITECT)"
  system_license: "MYTH-INSTITUTIONAL-COMMERCIAL-2026-BETA"

# ─── LLM Defaults ───
llm:
  provider: "nvidia-nim"
  base_url: "https://integrate.api.nvidia.com/v1"
  nvidia_nim_api_key: []
  model: "deepseek-ai/deepseek-v3.1-terminus"
  temperature: 0.4
  max_tokens: 200000
  top_p: 0.9
  # Fallback must differ from primary to provide actual fault tolerance
  fallback_model: "qwen/qwen3-coder-480b-a35b-instruct"
  rate_limit_ms: 0


# ─── MCP Server (Tool Bridge) ───
mcp:
  # ─────────────────────────────────────────────────────────────
  #  MCP SERVER REGISTRY (MISSION ASSETS)
  #  All servers in this blueprint are synced to config/mcp.json
  # ─────────────────────────────────────────────────────────────

  mcp_servers: {}
      
  tool_paths:
    - "/usr/bin"
    - "/usr/sbin"
    - "/usr/local/bin"
    - "/opt"
  blocked_commands: []

  max_output_bytes: 10485760

# ─── Sandbox (Bubblewrap) ───
sandbox:
  enabled: true
  bwrap_path: "/usr/bin/bwrap"
  share_network: true
  new_session: true
  die_with_parent: true
  read_only_paths:
    - "/usr"
    - "/lib"
    - "/lib64"
    - "/lib32"
    - "/etc/resolv.conf"
    - "/etc/ssl"
    - "/etc/hosts"
    - "/etc/alternatives"
    - "/etc/ca-certificates"
  writable_tmpfs:
    - "/tmp"
    - "/home"
    - "/var"
    - "/run"
  workspace_size_mb: 512
  hostname: "myth-sandbox"

# ─── Memory (Qdrant In-Memory) ───
memory:
  enabled: true
  backend: "qdrant"
  mode: "in-memory"
  grpc_port: 6334
  http_port: 6333
  collection_name: "session"
  vector_size: 1024
  auto_start: true
  qdrant_path: "qdrant"
  max_entries: 100000

# ─── TUI (Terminal Interface) ───
tui:
  enabled: false
  theme: "dark"
  font: "none"
  show_tree_panel: true
  show_status_bar: true
  max_output_lines: 5000
  scroll_speed: 3
  colors:
    primary: "#00ff88"
    secondary: "#0088ff"
    accent: "#ff0055"
    background: "#0a0a0f"
    surface: "#1a1a2e"
    text: "#e0e0e0"
    dim: "#666680"

# ─── Proxy (IP Rotation) ───
proxy:
  enabled: true
  url: null
  use_for_llm: true
  use_for_tools: true
  # Set to true to automatically send NEWNYM to Tor Control Port for IP rotation
  auto_rotate: false
  # tor_control_port: 9051
  # tor_control_password: "my_tor_password"

# ─── Default Recon Profiles ───
