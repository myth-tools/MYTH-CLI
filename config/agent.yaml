  custom:
    description: "User-controlled — you choose every tool for every step of every phase"
    mode: user
    strict_custom_commands: false
    max_iterations: 2000
    phases:
      - name: "Phase 0: Organizational Mapping"
        enabled: true
        steps:
          - name: "Root Domain Enumeration"
            tools: ["amass", "subfinder"]
            commands: 
              - "amass intel -whois -d target.com"
              - "subfinder -d target.com -o subfinder_roots.txt"
          - name: "ASN Discovery"
            tools: ["metabigor", "whois"]
            commands:
              - "metabigor net --org 'Target Corporation' -o asn_results.txt"
              - "whois -h whois.radb.net -- '-i mnt-by MAINT-AS12345'"
          - name: "Acquisition & Subsidiary Research"
            tools: ["theHarvester"]
            commands:
              - "theHarvester -d target.com -b google,duckduckgo -l 500"
          - name: "Reverse WHOIS"
            tools: ["whois"]
            commands:
              - "whois -h whois.iana.org target.com"
          - name: "Linked Discovery"
            tools: ["spiderfoot"]
            commands:
              - "spiderfoot -s target.com -m sfp_whois,sfp_dns,sfp_shodan"
          - name: "Seed Target List"
            tools: []
            commands: ["cat subfinder_roots.txt asn_results.txt | sort -u > seed_targets.txt"]

      - name: "Phase 1: Identity & Credential Intelligence"
        enabled: true
        steps:
          - name: "Employee & Hierarchy Mapping"
            tools: ["theHarvester", "sherlock"]
            commands:
              - "theHarvester -d target.com -b linkedin"
              - "sherlock target_admin_username"
          - name: "Email Format Discovery & Validation"
            tools: ["hunter.io", "theHarvester"]
            commands:
              - "theHarvester -d target.com -b hunter"
          - name: "Historical Credential Leak Analysis"
            tools: ["trufflehog", "h8mail"]
            commands:
              - "h8mail -t admin@target.com -q breachcomp"
          - name: "Identity-to-Service Mapping"
            tools: ["spiderfoot"]
            commands:
              - "spiderfoot -s target.com -m sfp_account"
          - name: "Password Policy Inference"
            tools: ["cewl", "cupp"]
            commands:
              - "cewl -d 2 -m 5 https://target.com -w target_wordlist.txt"

      - name: "Phase 2: Asset Discovery & Enumeration"
        enabled: true
        steps:
          - name: "WHOIS Deep Dive"
            tools: ["whois"]
            commands: ["whois target.com"]
          - name: "DNS Full Enumeration"
            tools: ["dnsx", "dnsrecon", "dig"]
            commands:
              - "dnsx -d target.com -resp-all -oa dns_results.txt"
              - "dnsrecon -d target.com -t std"
          - name: "Subdomain Discovery"
            tools: ["subfinder", "puredns", "amass"]
            commands:
              - "subfinder -d target.com -silent"
              - "puredns bruteforce /usr/share/wordlists/dirb/common.txt target.com"
          - name: "Reverse DNS"
            tools: ["dnsx"]
            commands: ["dnsx -ptr -l ip_list.txt"]
          - name: "Certificate Transparency Logs"
            tools: ["crt.sh", "certspotter"]
            commands: ['curl -s ''https://crt.sh/?q=%25.target.com&output=json'' | jq -r ''.[].name_value'' | sed ''s/\*\.//g'' | sort -u']
          - name: "OSINT Gathering"
            tools: ["shodan", "censys"]
            commands:
              - "shodan search 'hostname:target.com'"
              - "censys search 'target.com'"
          - name: "Technology Fingerprinting"
            tools: ["httpx", "whatweb"]
            commands:
              - "httpx -l subdomains.txt -td -title -status-code"
              - "whatweb -i subdomains.txt --aggression 3"

      - name: "Phase 3: Active Reconnaissance"
        enabled: true
        steps:
          - name: "Port Scanning"
            tools: ["naabu", "nmap"]
            commands:
              - "naabu -l subdomains.txt -top-ports 1000 -stats"
              - "nmap -iL live_hosts.txt -p 80,443,22,21,8080"
          - name: "Service Version Detection"
            tools: ["nmap -sV"]
            commands: ["nmap -sV -sC -iL live_hosts.txt"]
          - name: "Version-to-CVSS Investigation"
            tools: ["searchsploit"]
            commands: ["searchsploit --nmap service_scan.xml"]
          - name: "Stack Identification"
            tools: ["httpx", "whatweb"]
            commands: ["httpx -l active_urls.txt -server -x-powered-by"]
          - name: "CDN/WAF Fingerprinting"
            tools: ["wafw00f"]
            commands: ["wafw00f -i active_urls.txt"]
          - name: "Cloud Infrastructure Detection"
            tools: ["cloudfox", "cloud_enum"]
            commands:
              - "cloud_enum -k target"
              - "cloudfox aws --profile target-aws inventory"
          - name: "OS Fingerprinting"
            tools: ["nmap -O"]
            commands: ["nmap -O -iL live_hosts.txt"]
          - name: "Interesting Endpoint Discovery"
            tools: ["katana", "gau", "waybackurls"]
            commands:
              - "katana -list urls.txt -d 5 -jc -kf all"
              - "gau target.com --subs"

      - name: "Phase 4: Content & Application Discovery"
        enabled: true
        steps:
          - name: "Directory & File Bruteforce"
            tools: ["feroxbuster", "ffuf"]
            commands:
              - "feroxbuster -u https://target.com -w /usr/share/wordlists/dirb/common.txt -x php,html,js -t 50"
              - "ffuf -u https://target.com/FUZZ -w /usr/share/wordlists/dirb/common.txt -mc 200,301,302"
          - name: "Exposed Source Code & Git Extraction"
            tools: ["git-dumper", "trufflehog"]
            commands:
              - "git-dumper https://target.com/.git/ output_dir"
              - "trufflehog git file://$(pwd)/output_dir"
          - name: "JavaScript Analysis"
            tools: ["linkfinder", "secretfinder"]
            commands:
              - "linkfinder -i https://target.com/main.js -o cli"
              - "secretfinder -i https://target.com/bundle.js -o cli"
          - name: "Virtual Host Discovery"
            tools: ["ffuf"]
            commands: ["ffuf -u https://target.com -H 'Host: FUZZ.target.com' -w /usr/share/seclists/Discovery/DNS/subdomains-top1mil-5000.txt"]
          - name: "CMS Identification & Version Detection"
            tools: ["cmseek", "wpscan"]
            commands:
              - "cmseek -u https://target.com"
              - "wpscan --url https://target.com --enumerate vp,vt,tt"
          - name: "API Endpoint Discovery"
            tools: ["kiterunner", "arjun"]
            commands:
              - "kr scan https://api.target.com/v1 -w routes-large.json"
              - "arjun -u https://api.target.com/v1/user -m GET,POST"
          - name: "Authentication Mechanism Analysis"
            tools: ["jwt_tool"]
            commands: ["jwt_tool $JWT_TOKEN -T -X all"]
          - name: "WebSocket Endpoint Discovery"
            tools: ["wsrecon"]
            commands: ["wsrecon https://target.com"]

      - name: "Phase 5: Supply Chain & Dependency Analysis"
        enabled: true
        steps:
          - name: "JavaScript Library Analysis"
            tools: ["retire.js", "npm-audit-parser"]
            commands: ["retire --path src/"]
          - name: "Open Source Dependency Scanning"
            tools: ["osv-scanner", "grype"]
            commands:
              - "osv-scanner -r ."
              - "grype dir:."
          - name: "CDN & Third-Party Service Mapping"
            tools: ["wappalyzer"]
            commands: ["wappalyzer https://target.com"]
          - name: "Subresource Integrity (SRI) Checking"
            tools: ["sri-checker"]
            commands: ["sri-checker https://target.com"]

      - name: "Phase 6: AI/ML Attack Surface"
        enabled: true
        steps:
          - name: "AI Endpoint Discovery"
            tools: ["llm-fuzzer", "promptmap"]
            commands: ["promptmap -u https://ai.target.com/chat"]
          - name: "Model File Detection"
            tools: ["nuclei"]
            commands: ["nuclei -t vulnerabilities/ai-model-exposure.yaml -u https://target.com"]
          - name: "Training Data Exposure"
            tools: ["cloudsploit"]
            commands: ["cloudsploit --plugin s3PublicWrite"]

      - name: "Phase 7: Dynamic Input & Interaction Analysis"
        enabled: true
        steps:
          - name: "Hidden Parameter Discovery"
            tools: ["arjun", "paramspider"]
            commands: ["paramspider -d target.com"]
          - name: "File Upload Testing"
            tools: ["fuxploider"]
            commands: ["fuxploider -u https://target.com/upload -t php"]
          - name: "Special Character & Injection Testing"
            tools: ["sqlmap", "commix"]
            commands:
              - "sqlmap -u 'https://target.com/api?id=1' --batch --random-agent --level 3"
              - "commix --url='https://target.com/cmd.php?addr=INJECT_HERE' --batch"
          - name: "User Reference Analysis (IDOR Prep)"
            tools: ["autorize"]
            commands: ["autorize --url https://target.com"]
          - name: "User Role & Privilege Analysis"
            tools: ["autorize", "peass-ng"]
            commands: ["peass-ng linpeas -o"]
          - name: "Session Management Deep Dive"
            tools: ["jwt_tool"]
            commands: ["jwt_tool $COOKIE_JWT -C -d all"]

      - name: "Phase 8: Vulnerability Assessment"
        enabled: true
        steps:
          - name: "Known CVE Exploitation Check"
            tools: ["nuclei", "searchsploit", "nmap"]
            commands: ["nuclei -l subdomains.txt -t cves/ -severity critical,high"]
          - name: "Default/Weak Credential Testing"
            tools: ["hydra", "changeme"]
            commands: ["hydra -L /usr/share/wordlists/metasploit/unix_users.txt -P /usr/share/wordlists/metasploit/unix_passwords.txt ssh://target.com"]
          - name: "SSL/TLS Analysis"
            tools: ["testssl.sh"]
            commands: ["testssl.sh target.com"]
          - name: "Security Header Analysis"
            tools: ["httpx"]
            commands: ["httpx -l active_urls.txt -sc -title -td -server"]
          - name: "Misconfiguration Detection"
            tools: ["nuclei", "interactsh"]
            commands: ["nuclei -t vulnerabilities/misconfiguration/ -u https://target.com"]
          - name: "Subdomain Takeover Checks"
            tools: ["subjack", "nuclei"]
            commands: ["subjack -w domains.txt -t 100 -timeout 30 -o takeovers.txt"]
          - name: "IDOR Testing"
            tools: ["ffuf"]
            commands: ["ffuf -u https://target.com/api/user/FUZZ -w /usr/share/wordlists/metasploit/http_default_users.txt -mc 200"]
          - name: "CORS Misconfiguration Testing"
            tools: ["corsy"]
            commands: ["python3 corsy.py -u https://target.com"]
          - name: "XSS Detection"
            tools: ["dalfox"]
            commands: ["dalfox url https://target.com/search?q=MYTH"]
          - name: "Open Redirect Detection"
            tools: ["oralyzer"]
            commands: ["python3 oralyzer.py -u https://target.com/redirect?url=google.com"]
          - name: "SSRF Entry Point Identification"
            tools: ["ssrfmap", "interactsh"]
            commands: ["python3 ssrfmap.py -u https://target.com/proxy?url=http://169.254.169.254"]
          - name: "Race Condition Checks"
            tools: ["race-the-web"]
            commands: ["race-the-web config.yaml"]
          - name: "Template Injection (SSTI)"
            tools: ["sstimap"]
            commands: ["python3 sstimap.py -u https://target.com/template?name=MYTH"]

      - name: "Phase 9: Secrets & Exposure Analysis"
        enabled: true
        steps:
          - name: "Git & Source Code Leak Mining"
            tools: ["trufflehog", "gitleaks"]
            commands: ["gitleaks detect --source . -v"]
          - name: "Cloud Storage Exposure"
            tools: ["s3scanner", "cloud_enum"]
            commands: ["s3scanner scan --bucket target-assets"]
          - name: "Document Metadata Extraction"
            tools: ["exiftool", "metagoofil"]
            commands: ["metagoofil -d target.com -t pdf,doc,xls -n 50 -o documents/"]
          - name: "Paste Site & Dark Web Monitoring"
            tools: ["dehashed"]
            commands: ["dehashed -q 'target.com'"]
          - name: "GitHub Organization Monitoring"
            tools: ["gitdorker"]
            commands: ["python3 GitDorker.py -t <TOKEN> -org target_org"]

